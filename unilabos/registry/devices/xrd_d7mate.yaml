      set_voltage_current:
        feedback: {}
        goal:
          current: 30.0
          voltage: 40.0
        goal_default:
          current: null
          voltage: null
        handles: {}
        placeholder_keys: {}
        result: {}
        schema:
          description: 设置高压电源电压和电流
          properties:
            feedback:
              title: VoltageCurrentInput_Feedback
            goal:
              properties:
                current:
                  description: 电流值（mA）
                  type: number
                voltage:
                  description: 电压值（kV）
                  type: number
              required:
              - voltage
              - current
              title: VoltageCurrentInput_Goal
              type: object
            result:
              title: VoltageCurrentInput_Result
              type: object
          required:
          - goal
          title: set_voltage_current参数
          type: object
        type: UniLabJsonCommand
      start:
        feedback: {}
        goal: {}
        goal_default:
          end_theta: 80.0
          exp_time: 0.1
          increment: 0.05
          sample_id: ''
          start_theta: 10.0
          string: ''
          wait_minutes: 3.0
        handles: {}
        placeholder_keys: {}
        result: {}
        schema:
          description: 启动自动模式→上样→等待→样品准备→监控→检测下样位→执行下样流程。
          properties:
            feedback: {}
            goal:
              properties:
                end_theta:
                  default: 80.0
                  description: 结束角度（≥5.5°，且必须大于start_theta）
                  type: number
                exp_time:
                  default: 0.1
                  description: 曝光时间（0.1-5.0秒）
                  type: number
                increment:
                  default: 0.05
                  description: 角度增量（≥0.005）
                  type: number
                sample_id:
                  default: ''
                  description: 样品标识符
                  type: string
                start_theta:
                  default: 10.0
                  description: 起始角度（≥5°）
                  type: number
                string:
                  default: ''
                  description: 字符串格式的参数输入，如果提供则优先解析使用
                  type: string
                wait_minutes:
                  default: 3.0
                  description: 允许上样后等待分钟数
                  type: number
              required: []
              title: StartWorkflow_Goal
              type: object
            result:
              title: StartWorkflow_Result
              type: object
          required:
          - goal
          title: start参数
          type: object
        type: UniLabJsonCommand
      start_auto_mode:
        feedback: {}
        goal:
          status: true
        goal_default:
          status: null
        handles: {}
        placeholder_keys: {}
        result: {}
        schema:
