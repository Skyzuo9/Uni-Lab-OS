          description: ''
          properties:
            feedback:
              additionalProperties: true
              title: IntSingleInput_Feedback
              type: object
            goal:
              additionalProperties: false
              properties:
                int_input:
                  maximum: 2147483647
                  minimum: -2147483648
                  type: integer
              title: IntSingleInput_Goal
              type: object
