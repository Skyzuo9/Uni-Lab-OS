              type: object
          required:
          - goal
          title: start_auto_mode参数
          type: object
        type: UniLabJsonCommand
    module: unilabos.devices.xrd_d7mate.xrd_d7mate:XRDClient
    status_types:
      current_acquire_data: dict
      sample_request: dict
      sample_status: dict
    type: python
  config_info: []
  description: XRD D7-Mate X射线衍射分析设备，通过TCP通信实现远程控制与状态监控，支持自动模式控制、上样流程、数据获取、下样流程和高压电源控制等功能。
  handles: []
  icon: ''
  init_param_schema:
    config:
      properties:
        host:
          default: 127.0.0.1
          type: string
        port:
          default: 6001
          type: string
        timeout:
          default: 10.0
          type: string
      required: []
      type: object
    data:
      properties:
        current_acquire_data:
          type: object
        sample_request:
          type: object
        sample_status:
          type: object
      required:
      - current_acquire_data
      - sample_request
      - sample_status
      type: object
  version: 1.0.0
