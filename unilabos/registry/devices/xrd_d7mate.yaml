              type: object
          required:
          - goal
          title: EmptyIn
          type: object
        type: EmptyIn
      send_sample_down_ready:
        feedback: {}
        goal: {}
        goal_default: {}
        handles: {}
        placeholder_keys: {}
        result:
          return_info: return_info
        schema:
          description: ''
          properties:
            feedback:
              additionalProperties: true
              title: EmptyIn_Feedback
              type: object
            goal:
              additionalProperties: true
              title: EmptyIn_Goal
              type: object
            result:
              additionalProperties: false
              properties:
                return_info:
                  type: string
              title: EmptyIn_Result
              type: object
          required:
          - goal
          title: EmptyIn
          type: object
        type: EmptyIn
      send_sample_ready:
        feedback: {}
        goal:
          end_theta: 80.0
          exp_time: 0.5
          increment: 0.02
          sample_id: ''
          start_theta: 10.0
        goal_default:
          end_theta: null
          exp_time: null
          increment: null
          sample_id: null
          start_theta: null
        handles: {}
        placeholder_keys: {}
        result: {}
        schema:
          description: 送样完成后，发送样品信息和采集参数
          properties:
            feedback:
              title: SampleReadyInput_Feedback
            goal:
              properties:
                end_theta:
                  description: 结束角度（≥5.5°，且必须大于start_theta）
                  type: number
                exp_time:
                  description: 曝光时间（0.1-5.0秒）
                  type: number
                increment:
                  description: 角度增量（≥0.005）
                  type: number
                sample_id:
                  description: 样品标识符
                  type: string
                start_theta:
                  description: 起始角度（≥5°）
                  type: number
              required:
              - sample_id
              - start_theta
              - end_theta
              - increment
              - exp_time
              title: SampleReadyInput_Goal
              type: object
            result:
              title: SampleReadyInput_Result
              type: object
          required:
          - goal
          title: send_sample_ready参数
          type: object
        type: UniLabJsonCommand
      set_power_off:
