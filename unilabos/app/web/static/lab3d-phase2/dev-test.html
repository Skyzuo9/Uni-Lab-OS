<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Uni-Lab 3D 可视化测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1d23; color: #e0e0e0; font-family: -apple-system, "Microsoft YaHei", sans-serif; overflow: hidden; display: flex; }
        #canvas-container { flex: 1; height: 100vh; position: relative; }
        #side-panel {
            width: 340px; height: 100vh; overflow-y: auto;
            background: #22262e; border-left: 1px solid #3a3f4b;
            display: flex; flex-direction: column;
        }
        .panel-section { padding: 14px 16px; border-bottom: 1px solid #3a3f4b; }
        .panel-title { font-size: 13px; font-weight: 600; color: #8ab4f8; margin-bottom: 10px; letter-spacing: 0.5px; }
        .status-row { display: flex; align-items: center; padding: 5px 0; font-size: 12px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
        .dot-ok { background: #4caf50; box-shadow: 0 0 4px #4caf50; }
        .dot-warn { background: #ff9800; }
        .dot-err { background: #f44336; }
        .dot-off { background: #555; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            background: #3a7afe; color: #fff; border: none; padding: 7px 14px;
            border-radius: 6px; cursor: pointer; font-size: 12px; margin: 3px 2px;
            transition: background 0.15s;
        }
        .btn:hover { background: #5a94ff; }
        .btn-outline { background: transparent; border: 1px solid #3a7afe; color: #8ab4f8; }
        .btn-outline:hover { background: rgba(58,122,254,0.15); }
        .btn-success { background: #2e7d32; }
        .btn-success:hover { background: #388e3c; }
        .btn-block { width: 100%; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 4px; }
        select, input[type="text"] {
            width: 100%; padding: 7px 10px; border-radius: 6px;
            border: 1px solid #3a3f4b; background: #1a1d23; color: #e0e0e0;
            font-size: 12px; margin: 4px 0;
        }
        select:focus, input:focus { outline: none; border-color: #3a7afe; }
        .hint { font-size: 11px; color: #888; margin-top: 4px; }
        #log-box {
            flex: 1; min-height: 100px; font-size: 11px; font-family: 'Consolas', monospace;
            overflow-y: auto; background: #14161a; padding: 8px; margin-top: 6px;
            border-radius: 6px; line-height: 1.5;
        }
        .log-time { color: #666; }
        .log-ok { color: #81c784; }
        .log-err { color: #ef5350; }
        .log-info { color: #90caf9; }
        #loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center;
            z-index: 100; font-size: 16px; color: #8ab4f8;
        }
        #loading-overlay.active { display: flex; }
        .spinner { border: 3px solid #333; border-top: 3px solid #3a7afe; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; margin-right: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="loading-overlay"><div class="spinner"></div><span id="loading-text">加载中...</span></div>
    </div>
    <div id="side-panel">

        <div class="panel-section">
            <div class="panel-title">连接状态</div>
            <div class="status-row"><div id="dot-foxglove" class="status-dot dot-off"></div><span id="lbl-foxglove">Foxglove Bridge: 未连接</span></div>
            <div class="status-row"><div id="dot-joint" class="status-dot dot-off"></div><span id="lbl-joint">关节数据: 无</span></div>
            <div class="status-row"><div id="dot-resource" class="status-dot dot-off"></div><span id="lbl-resource">耗材位姿: 无</span></div>
            <div class="status-row"><div id="dot-traj" class="status-dot dot-off"></div><span id="lbl-traj">轨迹数据: 无</span></div>
        </div>

        <div class="panel-section">
            <div class="panel-title">URDF 模型加载</div>
            <button class="btn btn-success btn-block" onclick="loadDemoRobot()">一键加载仿真机器人 (dummy2 + 工作台)</button>
            <div style="margin-top: 10px;">
                <label style="font-size: 12px; color: #aaa;">从实验站文件生成 URDF:</label>
                <select id="station-select">
                    <option value="">-- 选择实验站文件 --</option>
                    <option value="/home/ubuntu/workspace/Uni-Lab-OS/lab_with_arm.json">lab_with_arm.json (2 设备)</option>
                    <option value="/home/ubuntu/workspace/Uni-Lab-OS/unilabos/test/experiments/comprehensive_protocol/comprehensive_station.json">综合实验站 (20 设备)</option>
                    <option value="/home/ubuntu/workspace/Uni-Lab-OS/unilabos/test/experiments/Protocol_Test_Station/evacuateandrefill_test_station.json">排空回填测试站 (11 设备)</option>
                    <option value="/home/ubuntu/workspace/Uni-Lab-OS/unilabos/test/experiments/Protocol_Test_Station/heatchill_protocol_test_station.json">加热冷却测试站 (9 设备)</option>
                    <option value="/home/ubuntu/workspace/Uni-Lab-OS/unilabos/test/experiments/reaction_station_bioyond.json">反应站 (6 设备)</option>
                </select>
                <button class="btn btn-block" onclick="loadFromStation()">从实验站生成并加载</button>
            </div>
            <div style="margin-top: 10px;">
                <label style="font-size: 12px; color: #aaa;">自定义 station JSON 绝对路径:</label>
                <input id="custom-input" type="text" placeholder="例: /home/ubuntu/workspace/...station.json">
                <button class="btn btn-outline btn-block" onclick="loadCustom()">加载</button>
            </div>
            <div class="hint">URDF 由后端 /api/v1/layout/urdf 端点动态生成，无 mesh 的设备显示为灰色方块</div>
        </div>

        <div class="panel-section">
            <div class="panel-title">仿真测试</div>
            <div class="btn-group">
                <button class="btn btn-outline" onclick="testJointPublish()">模拟关节</button>
                <button class="btn btn-outline" onclick="testDeviceStatus()">模拟设备状态</button>
                <button class="btn btn-outline" onclick="testTrajectory()">模拟轨迹</button>
            </div>
        </div>

        <div class="panel-section" style="flex: 1; display: flex; flex-direction: column;">
            <div class="panel-title">运行日志 <span style="float:right; cursor:pointer; color:#666;" onclick="document.getElementById('log-box').innerHTML=''">[清空]</span></div>
            <div id="log-box"></div>
        </div>
    </div>

    <script type="module">
        import { createScene, loadURDFText, updateJointState, animate, getRobot } from './urdf-scene.js';
        import { RosBridge } from './ros-bridge.js';
        import { StatusOverlay } from './status-overlay.js';
        import { TrajectoryPlayer } from './trajectory-player.js';

        // --- 日志 ---
        function log(msg, type) {
            const el = document.getElementById('log-box');
            const time = new Date().toLocaleTimeString('zh-CN');
            const cls = type === 'ok' ? 'log-ok' : type === 'err' ? 'log-err' : 'log-info';
            el.innerHTML = '<div><span class="log-time">[' + time + ']</span> <span class="' + cls + '">' + msg + '</span></div>' + el.innerHTML;
            if (el.children.length > 300) { while (el.children.length > 200) el.removeChild(el.lastChild); }
        }
        function showLoading(text) { document.getElementById('loading-text').textContent = text; document.getElementById('loading-overlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loading-overlay').classList.remove('active'); }

        // --- 场景 ---
        const container = document.getElementById('canvas-container');
        const scene = createScene(container);
        animate();
        log('Three.js 场景初始化完成', 'ok');

        // --- StatusOverlay (uses connectWebSocket + setStatus) ---
        const statusOverlay = new StatusOverlay(scene);

        // --- TrajectoryPlayer (constructor: robot, container) ---
        // 初始化时 robot 可能还不存在，传 null，后续加载 URDF 后不需要重建
        let trajPlayer = null;
        function ensureTrajPlayer() {
            if (!trajPlayer) {
                trajPlayer = new TrajectoryPlayer(getRobot(), document.body);
            }
            return trajPlayer;
        }

        // --- Foxglove Bridge ---
        const bridge = new RosBridge('ws://' + window.location.hostname + ':8765');
        bridge.connect();
        log('正在连接 Foxglove Bridge...');

        // --- 话题回调 ---
        let jointCount = 0;
        bridge.on('/joint_states', function(msg) {
            updateJointState(msg);
            jointCount++;
            document.getElementById('dot-joint').className = 'status-dot dot-ok';
            document.getElementById('lbl-joint').textContent = '关节数据: ' + (msg.name ? msg.name.length : 0) + ' 轴 (帧 ' + jointCount + ')';
        });

        bridge.on('/move_group/display_planned_path', function(msg) {
            try {
                ensureTrajPlayer().loadTrajectory(msg);
                document.getElementById('dot-traj').className = 'status-dot dot-ok';
                document.getElementById('lbl-traj').textContent = '轨迹数据: 已接收';
                log('收到轨迹规划数据', 'ok');
            } catch (e) {
                log('轨迹加载失败: ' + e.message, 'err');
            }
        });

        bridge.on('resource_pose', function() {
            document.getElementById('dot-resource').className = 'status-dot dot-ok';
            document.getElementById('lbl-resource').textContent = '耗材位姿: 接收中';
        });

        // --- 状态轮询 ---
        setInterval(function() {
            var fb = bridge.connected;
            document.getElementById('dot-foxglove').className = 'status-dot ' + (fb ? 'dot-ok' : 'dot-err');
            document.getElementById('lbl-foxglove').textContent = 'Foxglove Bridge: ' + (fb ? '已连接' : '断开');
        }, 2000);

        // --- 从 API 加载 URDF ---
        async function loadFromApi(stationPath) {
            showLoading('正在生成 URDF...');
            var apiBase = window.location.origin;
            var url = apiBase + '/api/v1/layout/urdf?station_path=' + encodeURIComponent(stationPath);
            log('请求: ' + url);
            try {
                var resp = await fetch(url);
                if (!resp.ok) throw new Error('HTTP ' + resp.status + ': ' + (await resp.text()));
                var data = await resp.json();
                if (data.device_count === 0) {
                    log('该实验站未包含可渲染的设备节点', 'err');
                    hideLoading();
                    return;
                }
                log('URDF 生成成功: ' + data.device_count + ' 设备, ' + data.urdf.length + ' 字符', 'ok');
                showLoading('正在渲染 3D 模型...');
                var meshBase = apiBase;
                var robot = loadURDFText(data.urdf, meshBase);
                var jointNames = Object.keys(robot.joints || {});
                log('3D 渲染完成: ' + jointNames.length + ' 个关节', 'ok');
                if (jointNames.length > 0) {
                    log('关节列表: ' + jointNames.join(', '), 'info');
                }
                hideLoading();
            } catch (e) {
                log('加载失败: ' + e.message, 'err');
                hideLoading();
            }
        }

        // --- 全局函数 ---
        window.loadDemoRobot = function() {
            log('一键加载: lab_with_arm.json...');
            loadFromApi('/home/ubuntu/workspace/Uni-Lab-OS/lab_with_arm.json');
        };

        window.loadFromStation = function() {
            var path = document.getElementById('station-select').value;
            if (!path) { log('请先选择一个实验站文件', 'err'); return; }
            var label = document.getElementById('station-select').selectedOptions[0].textContent;
            log('加载实验站: ' + label);
            loadFromApi(path);
        };

        window.loadCustom = function() {
            var input = document.getElementById('custom-input').value.trim();
            if (!input) { log('请输入 station JSON 文件的绝对路径', 'err'); return; }
            loadFromApi(input);
        };

        window.testJointPublish = function() {
            var names = ['dummy2_arm_Joint1', 'dummy2_arm_Joint2', 'dummy2_arm_Joint3', 'dummy2_arm_Joint4', 'dummy2_arm_Joint5', 'dummy2_arm_Joint6'];
            updateJointState({ name: names, position: names.map(function() { return (Math.random() - 0.5) * 2; }) });
            log('已发送模拟关节数据 (6轴随机)', 'ok');
        };

        window.testDeviceStatus = function() {
            statusOverlay.setStatus('arm_slider', 'running');
            statusOverlay.setStatus('workbench_1', 'idle');
            log('模拟设备状态: arm_slider=running, workbench_1=idle', 'ok');
        };

        window.testTrajectory = function() {
            var names = ['dummy2_arm_Joint1', 'dummy2_arm_Joint2', 'dummy2_arm_Joint3', 'dummy2_arm_Joint4', 'dummy2_arm_Joint5', 'dummy2_arm_Joint6'];
            try {
                ensureTrajPlayer().loadTrajectory({
                    trajectory: [{
                        joint_trajectory: {
                            joint_names: names,
                            points: [
                                { positions: [0,0,0,0,0,0], time_from_start: {sec:0, nanosec:0} },
                                { positions: [0.5,0.3,-0.2,0.4,-0.3,0.1], time_from_start: {sec:1, nanosec:0} },
                                { positions: [1.0,0.6,-0.4,0.8,-0.6,0.2], time_from_start: {sec:2, nanosec:0} },
                                { positions: [0,0,0,0,0,0], time_from_start: {sec:3, nanosec:0} },
                            ]
                        }
                    }]
                });
                document.getElementById('dot-traj').className = 'status-dot dot-ok';
                document.getElementById('lbl-traj').textContent = '轨迹数据: 模拟 (4点)';
                log('已加载模拟轨迹，点击底部 Play 按钮播放', 'ok');
            } catch (e) {
                log('轨迹加载失败: ' + e.message, 'err');
            }
        };

        log('页面就绪，点击「一键加载仿真机器人」开始', 'info');
    </script>
</body>
</html>
